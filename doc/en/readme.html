<!DOCTYPE html>

<head><meta charset="UTF-8"><title>Battery Alarm</title></head>
<body>
<h1>Battery Alarm</h1>
<p>Plays a sound when the battery reaches a configurable percentage.</p>
<h2>Usage</h2>
<ul>
<li><strong>NVDA+Shift+Alt+A</strong>: Open settings dialog</li>
</ul>
<h2>Settings</h2>
<ul>
<li>Enable/disable the alarm</li>
<li>Threshold percentage (1-100)</li>
<li>Beep frequency (Hz)</li>
<li>Beep duration (ms)</li>
<li>Test sound button</li>
</ul>
</body>
</html>
